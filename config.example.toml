# Sesame5 UUID. Accepts dashed or non-dashed hex.
sesame_id = "00000000-0000-0000-0000-000000000000"

# Sesame5 OS3 secret key hex. This is the 16-byte device secret saved by the Sesame SDK/app.
sesame_secret_key = "00000000000000000000000000000000"

# Nature Remo Cloud API personal access token. Required for monitor.
nature_token = "replace-me"

# Nature Remo LIGHT appliance name and button command. Required for monitor.
nature_light_appliance_name = "replace-me"
nature_light_button = "on"

# Optional custom IR signals sent in array order for each Sesame5 state transition.
# Each signal is identified by its appliance name and signal name in the Nature Remo app.
nature_unlock_signals = []
nature_lock_signals = []
